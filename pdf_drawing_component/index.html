<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; font-family: system-ui, sans-serif; color: #17202a; }
    body { background: transparent; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    button, input, textarea { min-height: 34px; border: 1px solid #d9dee7; border-radius: 6px; background: #fff; color: #17202a; }
    button { padding: 6px 10px; cursor: pointer; font-weight: 600; }
    button.active { border-color: #0f766e; background: #e6f4f1; color: #0f766e; }
    button.primary { margin-left: auto; border-color: #0f766e; background: #0f766e; color: #fff; }
    button.danger { color: #b42318; }
    input[type="color"] { width: 42px; padding: 3px; }
    input[type="range"] { width: 110px; }
    textarea { min-width: 210px; height: 58px; padding: 7px 8px; resize: vertical; font: inherit; }
    .workspace { display: grid; grid-template-columns: minmax(360px, 1fr) 250px; align-items: start; gap: 10px; width: 100%; }
    .canvas-wrap { min-width: 0; overflow: hidden; border: 1px solid #d9dee7; border-radius: 6px; background: #eef1f5; }
    canvas { display: block; width: 100%; height: auto; background: #fff; cursor: crosshair; touch-action: none; }
    .comments { position: sticky; top: 0; min-width: 0; max-height: 760px; overflow-y: auto; padding-right: 3px; }
    .comments-title { margin: 0 0 8px; font-size: 14px; }
    .empty-comments { padding: 14px; border: 1px dashed #c8d0dc; border-radius: 6px; color: #5b6675; font-size: 13px; }
    .comment-card { margin-bottom: 8px; padding: 9px; border: 1px solid #d9dee7; border-left: 4px solid #0f766e; border-radius: 6px; background: #fff; cursor: pointer; }
    .comment-card.selected { border-color: #0f766e; background: #f0fdfa; }
    .comment-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 700; }
    .comment-card textarea { width: 100%; min-width: 0; height: 82px; }
    .comment-delete { min-height: 26px; padding: 2px 7px; color: #b42318; }
    .hint { margin: 7px 0 0; color: #5b6675; font-size: 12px; }
    @media (max-width: 700px) {
      .workspace { display: block; }
      .comments { position: static; max-height: none !important; margin-top: 10px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" data-tool="marker" class="active">&#12510;&#12540;&#12459;&#12540;</button>
    <button type="button" data-tool="pen">&#12506;&#12531;</button>
    <button type="button" data-tool="line">&#30452;&#32218;</button>
    <button type="button" data-tool="rect">&#22235;&#35282;</button>
    <button type="button" data-tool="comment">&#12467;&#12513;&#12531;&#12488;</button>
    <button type="button" data-tool="eraser">&#28040;&#12375;&#12468;&#12512;</button>
    <input id="color" type="color" value="#f5c542" title="Color">
    <input id="width" type="range" min="2" max="28" value="12" title="Width">
    <textarea id="memo" placeholder="&#12467;&#12513;&#12531;&#12488;&#12434;&#20837;&#21147;&#12375;&#12289;PDF&#19978;&#12398;&#25991;&#31456;&#12434;&#12489;&#12521;&#12483;&#12464;"></textarea>
    <button id="undo" type="button">&#20803;&#12395;&#25147;&#12377;</button>
    <button id="clear" type="button" class="danger">&#20840;&#12390;&#28040;&#12377;</button>
    <button id="save" type="button" class="primary">&#27880;&#37320;&#12434;&#20445;&#23384;</button>
  </div>
  <div class="workspace">
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <aside class="comments">
      <h3 class="comments-title">&#12467;&#12513;&#12531;&#12488;</h3>
      <div id="comment-list"></div>
    </aside>
  </div>
  <p class="hint"><span id="status">&#25551;&#30011;&#12420;&#12467;&#12513;&#12531;&#12488;&#12434;&#36861;&#21152;&#12375;&#12289;&#26368;&#24460;&#12395;&#12300;&#27880;&#37320;&#12434;&#20445;&#23384;&#12301;&#12434;&#25276;&#12375;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;</span></p>
  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const colorInput = document.getElementById("color");
    const widthInput = document.getElementById("width");
    const memoInput = document.getElementById("memo");
    const commentList = document.getElementById("comment-list");
    let tool = "marker";
    let objects = [];
    let draft = null;
    let backgroundImage = null;
    let canvasKey = "";
    let selectedCommentIndex = -1;
    let lastFrameHeight = 0;

    function post(type, extra = {}) {
      window.parent.postMessage({ isStreamlitMessage: true, type, ...extra }, "*");
    }
    function setHeight() {
      const height = document.body.scrollHeight;
      if (height !== lastFrameHeight) {
        lastFrameHeight = height;
        post("streamlit:setFrameHeight", { height });
      }
    }
    function point(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: (event.clientX - rect.left) * canvas.width / rect.width, y: (event.clientY - rect.top) * canvas.height / rect.height };
    }
    function normalized(p) { return { x: p.x / canvas.width, y: p.y / canvas.height }; }
    function pixels(p) { return { x: p.x * canvas.width, y: p.y * canvas.height }; }
    function styleFor(object) {
      ctx.strokeStyle = object.color || "#f5c542";
      ctx.fillStyle = object.color || "#f5c542";
      ctx.lineWidth = Number(object.width || 4);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.globalAlpha = object.type === "marker" || object.type === "comment_highlight" ? 0.32 : 0.95;
    }
    function drawObject(object) {
      styleFor(object);
      const points = (object.points || []).map(pixels);
      if ((object.type === "pen" || object.type === "marker" || object.type === "comment_highlight") && points.length) {
        if (object.type === "comment_highlight") {
          const selected = objects.indexOf(object) === selectedCommentIndex;
          ctx.strokeStyle = selected ? "#0f766e" : (object.color || "#f5c542");
          ctx.lineWidth = selected ? Math.max(Number(object.width || 16) + 5, 21) : Number(object.width || 16);
          ctx.globalAlpha = selected ? 0.45 : 0.3;
        }
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        if (points.length === 1) ctx.lineTo(points[0].x + 8, points[0].y);
        points.slice(1).forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
      } else if (object.type === "line" && points.length > 1) {
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[1].x, points[1].y); ctx.stroke();
      } else if (object.type === "rect" && points.length > 1) {
        ctx.strokeRect(points[0].x, points[0].y, points[1].x - points[0].x, points[1].y - points[0].y);
      } else if ((object.type === "comment" || object.type === "text") && points.length) {
        const selected = objects.indexOf(object) === selectedCommentIndex;
        ctx.globalAlpha = selected ? 0.5 : 0.25;
        ctx.beginPath();
        ctx.arc(points[0].x, points[0].y, selected ? 9 : 7, 0, Math.PI * 2);
        ctx.fillStyle = "#0f766e";
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (backgroundImage && backgroundImage.complete) ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
      objects.forEach(drawObject);
      if (draft) drawObject(draft);
      renderComments();
    }
    function commentObjects() {
      return objects
        .map((object, index) => ({ object, index }))
        .filter(item => ["comment_highlight", "comment", "text"].includes(item.object.type));
    }
    function selectComment(index) {
      selectedCommentIndex = index;
      redraw();
    }
    function renderComments() {
      const comments = commentObjects();
      commentList.replaceChildren();
      if (!comments.length) {
        const empty = document.createElement("div");
        empty.className = "empty-comments";
        empty.textContent = "コメントを入力してPDF上の文章をドラッグすると、ここに表示されます。";
        commentList.appendChild(empty);
        return;
      }
      comments.forEach((item, commentIndex) => {
        const card = document.createElement("div");
        card.className = `comment-card${item.index === selectedCommentIndex ? " selected" : ""}`;
        card.addEventListener("click", () => selectComment(item.index));
        const head = document.createElement("div");
        head.className = "comment-head";
        const title = document.createElement("span");
        title.textContent = `マーカーコメント ${commentIndex + 1}`;
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "comment-delete";
        remove.textContent = "削除";
        remove.addEventListener("click", event => {
          event.stopPropagation();
          objects.splice(item.index, 1);
          selectedCommentIndex = -1;
          redraw();
        });
        const editor = document.createElement("textarea");
        editor.value = item.object.text || "";
        editor.addEventListener("click", event => event.stopPropagation());
        editor.addEventListener("input", event => { item.object.text = event.target.value; setHeight(); });
        head.append(title, remove);
        card.append(head, editor);
        commentList.appendChild(card);
      });
      setHeight();
    }
    function objectDistance(object, p) {
      const points = (object.points || []).map(pixels);
      if (!points.length) return Infinity;
      return Math.min(...points.map(q => Math.hypot(q.x - p.x, q.y - p.y)));
    }
    function nearestCommentIndex(p) {
      let bestIndex = -1;
      let bestDistance = 22;
      commentObjects().forEach(item => {
        const distance = objectDistance(item.object, p);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = item.index;
        }
      });
      return bestIndex;
    }
    function selectTool(nextTool) {
      tool = nextTool;
      document.querySelectorAll("[data-tool]").forEach(button => button.classList.toggle("active", button.dataset.tool === tool));
      canvas.style.cursor = tool === "eraser" ? "not-allowed" : "crosshair";
    }
    document.querySelectorAll("[data-tool]").forEach(button => button.addEventListener("click", () => selectTool(button.dataset.tool)));
    canvas.addEventListener("pointerdown", event => {
      const p = point(event);
      canvas.setPointerCapture(event.pointerId);
      const clickedCommentIndex = nearestCommentIndex(p);
      if (clickedCommentIndex >= 0 && tool !== "eraser") {
        selectComment(clickedCommentIndex);
        return;
      }
      if (tool === "eraser") {
        let bestIndex = -1, bestDistance = 36;
        objects.forEach((object, index) => { const distance = objectDistance(object, p); if (distance < bestDistance) { bestDistance = distance; bestIndex = index; } });
        if (bestIndex >= 0) objects.splice(bestIndex, 1);
        redraw(); return;
      }
      if (tool === "comment") {
        const textValue = memoInput.value.trim();
        if (!textValue) {
          document.getElementById("status").textContent = "先にコメント内容を入力してください。";
          return;
        }
        draft = { type: "comment_highlight", color: colorInput.value, width: Math.max(Number(widthInput.value), 16), text: textValue, points: [normalized(p)] };
        return;
      }
      draft = { type: tool, color: colorInput.value, width: Number(widthInput.value), points: [normalized(p)] };
    });
    canvas.addEventListener("pointermove", event => {
      if (!draft) return;
      const p = normalized(point(event));
      if (["pen", "marker", "comment_highlight"].includes(draft.type)) draft.points.push(p); else draft.points[1] = p;
      redraw();
    });
    function finishDraft() {
      if (!draft) return;
      if (draft.type === "comment_highlight") {
        if (draft.points.length === 1) {
          draft.points.push({ x: Math.min(draft.points[0].x + 0.06, 1), y: draft.points[0].y });
        }
        objects.push(draft);
        selectedCommentIndex = objects.length - 1;
        memoInput.value = "";
        document.getElementById("status").textContent = "マーカーにコメントを紐づけました。保存すると反映されます。";
      } else {
        objects.push(draft);
      }
      draft = null;
      redraw();
    }
    canvas.addEventListener("pointerup", finishDraft);
    canvas.addEventListener("pointercancel", finishDraft);
    document.getElementById("undo").addEventListener("click", () => { objects.pop(); selectedCommentIndex = -1; redraw(); });
    document.getElementById("clear").addEventListener("click", () => { if (window.confirm("このページの注釈を全て消しますか？")) { objects = []; selectedCommentIndex = -1; redraw(); } });
    document.getElementById("save").addEventListener("click", () => {
      document.getElementById("status").textContent = "Saving...";
      post("streamlit:setComponentValue", {
        value: { save_id: `${Date.now()}-${Math.random()}`, drawing: { version: "1", canvas_width: canvas.width, canvas_height: canvas.height, objects } },
        dataType: "json"
      });
    });
    function render(args) {
      const nextKey = String(args.canvas_key || "");
      canvas.width = Math.max(320, Number(args.width || 720));
      canvas.height = Math.max(240, Number(args.height || 960));
      if (nextKey !== canvasKey) {
        canvasKey = nextKey;
        const initial = args.initial_drawing || {};
        objects = Array.isArray(initial.objects) ? initial.objects : [];
        selectedCommentIndex = -1;
      }
      const source = args.background_data_url || "";
      if (!source) { backgroundImage = null; redraw(); setHeight(); return; }
      backgroundImage = new Image();
      backgroundImage.onload = () => {
        redraw();
        requestAnimationFrame(() => {
          document.querySelector(".comments").style.maxHeight = `${canvas.getBoundingClientRect().height}px`;
          setHeight();
        });
      };
      backgroundImage.src = source;
    }
    window.addEventListener("message", event => { if (event.data && event.data.type === "streamlit:render") render(event.data.args || {}); });
    post("streamlit:componentReady", { apiVersion: 1 });
    setHeight();
  </script>
</body>
</html>
